apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: REPO_URL
    targetRevision: HEAD
    path: clusters/default/apps/garage
  destination:
    server: https://kubernetes.default.svc
    namespace: garage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  # Secret is created imperatively by `cluster_manager.py bootstrap-infra-secrets`
  # and must not be reverted by Argo. Adding Respect annotation would also work;
  # we just don't commit the Secret manifest at all, so there's nothing to revert.
