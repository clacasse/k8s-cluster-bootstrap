apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 84.3.0
    helm:
      releaseName: kube-prometheus-stack
      skipCrds: true
      values: |
        # Node exporter on every node including GPU
        nodeExporter:
          tolerations:
            - key: nvidia.com/gpu
              operator: Equal
              value: "true"
              effect: NoSchedule

        # Prometheus config
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: local-path
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 20Gi
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false

        # Grafana config
        grafana:
          adminPassword: ""
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: traefik
            annotations:
              traefik.ingress.kubernetes.io/router.entrypoints: websecure
              traefik.ingress.kubernetes.io/router.tls: "true"
            hosts:
              - grafana.APPS_DOMAIN
          persistence:
            enabled: true
            storageClassName: local-path
            size: 5Gi
          # Loki datasource — provisioned alongside the default Prometheus
          # datasource so Explore + dashboards can query logs without manual
          # Grafana config. The Loki Argo Application creates the loki Service
          # in the loki namespace; the URL below is the in-cluster DNS name.
          additionalDataSources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki.loki.svc.cluster.local:3100
              isDefault: false
              jsonData:
                maxLines: 1000
                timeout: 60

        # Alertmanager — disable for now
        alertmanager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
