apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: write-config
          # alpine (not busybox) so we can install jq for merging MCP
          # overrides. The merge lets downstream forks register extra MCP
          # servers — e.g., private apps — without forking this file.
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache jq >/dev/null

              MODEL_ID="${ACTIVE_MODEL:-gemma4:26b}"

              # Base MCP servers shipped with this public deployment.
              BASE_MCP_SERVERS='{
                "vault-search": {
                  "url": "http://rag-mcp.openclaw.svc.cluster.local:8080/sse",
                  "transport": "sse"
                }
              }'

              # Optional per-cluster overrides. Any fork / private-apps repo
              # creates a ConfigMap named `openclaw-mcp-extra` in this
              # namespace with a `servers.json` key containing a JSON object
              # of additional `{name: {url, transport, ...}}` entries. The
              # ConfigMap volume mounts optional, so pods start cleanly when
              # there's no override.
              if [ -f /mcp-extra/servers.json ] && [ -s /mcp-extra/servers.json ]; then
                MCP_SERVERS=$(echo "${BASE_MCP_SERVERS}" \
                    | jq -c --argjson extra "$(cat /mcp-extra/servers.json)" '. + $extra')
              else
                MCP_SERVERS=$(echo "${BASE_MCP_SERVERS}" | jq -c .)
              fi

              cat > /data/openclaw.json <<CONF
              {
                "gateway": {
                  "bind": "lan",
                  "trustedProxies": ["10.42.0.0/16"],
                  "auth": {
                    "token": "${GATEWAY_TOKEN}"
                  },
                  "controlUi": {
                    "allowedOrigins": ["*"],
                    "dangerouslyDisableDeviceAuth": ${DISABLE_DEVICE_AUTH}
                  }
                },
                "models": {
                  "providers": {
                    "ollama": {
                      "baseUrl": "http://ollama-metrics.ollama.svc.cluster.local:11434",
                      "api": "ollama",
                      "models": [
                        {
                          "id": "${MODEL_ID}",
                          "name": "${MODEL_ID}",
                          "reasoning": false,
                          "input": ["text", "image"],
                          "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0},
                          "contextWindow": 128000,
                          "maxTokens": 8192
                        }
                      ]
                    }
                  }
                },
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "ollama/${MODEL_ID}"
                    },
                    "runtime": "acp",
                    "workspace": "/vault",
                    "compaction": {
                      "reserveTokensFloor": 32000
                    }
                  }
                },
                "mcp": {
                  "servers": ${MCP_SERVERS}
                }
              }
              CONF
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: ACTIVE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-model
                  key: active-model
            - name: DISABLE_DEVICE_AUTH
              valueFrom:
                configMapKeyRef:
                  name: openclaw-config
                  key: disable-device-auth
          volumeMounts:
            - name: data
              mountPath: /data
            - name: mcp-extra
              mountPath: /mcp-extra
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.22-1
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_SKIP_SERVICE_CHECK
              value: "true"
            - name: OLLAMA_API_KEY
              value: ollama-local  # placeholder — Ollama has no real auth; this just enables the provider
            - name: OLLAMA_BASE_URL
              value: http://ollama-metrics.ollama.svc.cluster.local:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: slack-bot-token
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: slack-app-token
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: telegram-bot-token
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: vault
              mountPath: /vault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
        - name: mcp-extra
          configMap:
            name: openclaw-mcp-extra
            optional: true
