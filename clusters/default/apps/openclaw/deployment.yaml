apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: write-config
          # alpine (not busybox) so we can install jq for merging MCP
          # overrides. The merge lets downstream forks register extra MCP
          # servers — e.g., private apps — without forking this file.
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache jq >/dev/null

              # The active-model ConfigMap still stores the model id the user
              # wants. With llama.cpp it's the --alias value the chat server
              # reports via /v1/models (default "qwen3-14b"). Legacy Ollama
              # defaults like "gemma4:26b" are retained only as a safety net
              # when the ConfigMap is missing; they won't actually resolve to
              # a served model.
              MODEL_ID="${ACTIVE_MODEL:-qwen3-14b}"

              # Note on provider "api" values: OpenClaw rejects anything
              # outside its enum of driver names ("openai-completions",
              # "openai-responses", "anthropic-messages", "ollama", ...)
              # and falls back to last-known-good config. llama.cpp
              # speaks the classic Chat Completions endpoint, so
              # "openai-completions" is the right choice — NOT "openai".

              # Base MCP servers shipped with this public deployment.
              BASE_MCP_SERVERS='{
                "vault-search": {
                  "url": "http://rag-mcp.openclaw.svc.cluster.local:8080/sse",
                  "transport": "sse"
                }
              }'

              # Optional per-cluster overrides. Any fork / private-apps repo
              # creates a ConfigMap named `openclaw-mcp-extra` in this
              # namespace with a `servers.json` key containing a JSON object
              # of additional `{name: {url, transport, ...}}` entries. The
              # ConfigMap volume mounts optional, so pods start cleanly when
              # there's no override.
              if [ -f /mcp-extra/servers.json ] && [ -s /mcp-extra/servers.json ]; then
                MCP_SERVERS=$(echo "${BASE_MCP_SERVERS}" \
                    | jq -c --argjson extra "$(cat /mcp-extra/servers.json)" '. + $extra')
              else
                MCP_SERVERS=$(echo "${BASE_MCP_SERVERS}" | jq -c .)
              fi

              cat > /data/openclaw.json <<CONF
              {
                "gateway": {
                  "bind": "lan",
                  "trustedProxies": ["10.42.0.0/16"],
                  "auth": {
                    "token": "${GATEWAY_TOKEN}"
                  },
                  "controlUi": {
                    "allowedOrigins": ["*"],
                    "dangerouslyDisableDeviceAuth": ${DISABLE_DEVICE_AUTH}
                  }
                },
                "models": {
                  "providers": {
                    "openai": {
                      "baseUrl": "http://llama-chat.llama-cpp.svc.cluster.local:8080/v1",
                      "api": "openai-completions",
                      "models": [
                        {
                          "id": "${MODEL_ID}",
                          "name": "${MODEL_ID}",
                          "reasoning": false,
                          "input": ["text"],
                          "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0},
                          "contextWindow": 32768,
                          "maxTokens": 4096
                        }
                      ]
                    }
                  }
                },
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "openai/${MODEL_ID}"
                    },
                    "workspace": "/vault",
                    "compaction": {
                      "reserveTokensFloor": 8000
                    }
                  }
                },
                "plugins": {
                  "entries": {
                    "deepgram":   {"enabled": false},
                    "elevenlabs": {"enabled": false},
                    "microsoft":  {"enabled": false}
                  }
                },
                "mcp": {
                  "servers": ${MCP_SERVERS}
                }
              }
              CONF
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: ACTIVE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-model
                  key: active-model
            - name: DISABLE_DEVICE_AUTH
              valueFrom:
                configMapKeyRef:
                  name: openclaw-config
                  key: disable-device-auth
          volumeMounts:
            - name: data
              mountPath: /data
            - name: mcp-extra
              mountPath: /mcp-extra
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.23
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_SKIP_SERVICE_CHECK
              value: "true"
            - name: OPENAI_API_KEY
              value: llama-local  # placeholder — llama.cpp has no real auth; this just enables the provider
            - name: OPENAI_BASE_URL
              value: http://llama-chat.llama-cpp.svc.cluster.local:8080/v1
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: slack-bot-token
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: slack-app-token
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: telegram-bot-token
                  optional: true
            # Node.js defaults max-old-space-size to roughly half of the
            # container's memory limit. With the 2026.4.22 release auto-
            # enabling more plugins (browser, deepgram, elevenlabs, acpx),
            # the 1Gi pod limit capped Node at ~512MB heap and it OOMed at
            # startup. Give Node explicit room matching the raised pod
            # limit below.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=2048"
          # OpenClaw's Node.js event loop is single-threaded; during startup
          # it fetches model pricing from OpenRouter + LiteLLM (each a 30s
          # HTTP call to the internet) and that can delay /healthz and
          # /readyz responses past the default 1-second probe timeout.
          # Default timeoutSeconds=1 + failureThreshold=3 meant one busy
          # moment would trip "Readiness probe failed: context deadline
          # exceeded" repeatedly and kubelet would kill the pod as
          # Unhealthy. Widening the probes gives OpenClaw breathing room
          # without sacrificing the "pod is actually wedged" detection.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: vault
              mountPath: /vault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
        - name: mcp-extra
          configMap:
            name: openclaw-mcp-extra
            optional: true
