apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.14
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_SKIP_SERVICE_CHECK
              value: "true"
            - name: OPENCLAW_GATEWAY_BIND
              value: lan
            - name: OLLAMA_API_KEY
              value: ollama-local
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/openclaw/.openclaw
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
