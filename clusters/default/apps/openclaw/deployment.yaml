apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: write-config
          image: busybox
          command:
            - sh
            - -c
            - |
              MODEL_ID="${ACTIVE_MODEL:-gemma4:26b}"
              cat > /data/openclaw.json <<CONF
              {
                "gateway": {
                  "bind": "lan",
                  "trustedProxies": ["10.42.0.0/16"],
                  "auth": {
                    "token": "${GATEWAY_TOKEN}"
                  },
                  "controlUi": {
                    "allowedOrigins": ["*"],
                    "dangerouslyDisableDeviceAuth": true
                  }
                },
                "models": {
                  "providers": {
                    "ollama": {
                      "baseUrl": "http://ollama.ollama.svc.cluster.local:11434",
                      "api": "ollama",
                      "models": [
                        {
                          "id": "${MODEL_ID}",
                          "name": "${MODEL_ID}",
                          "reasoning": false,
                          "input": ["text", "image"],
                          "cost": {"input": 0, "output": 0, "cacheRead": 0, "cacheWrite": 0},
                          "contextWindow": 128000,
                          "maxTokens": 8192
                        }
                      ]
                    }
                  }
                },
                "agents": {
                  "defaults": {
                    "model": {
                      "primary": "ollama/${MODEL_ID}"
                    },
                    "workspace": "/vault"
                  }
                }
              }
              CONF
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: ACTIVE_MODEL
              valueFrom:
                configMapKeyRef:
                  name: openclaw-model
                  key: active-model
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.14
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_SKIP_SERVICE_CHECK
              value: "true"
            - name: OLLAMA_API_KEY
              value: ollama-local
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: slack-bot-token
                  optional: true
            - name: SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: slack-app-token
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: vault
              mountPath: /vault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: vault
          persistentVolumeClaim:
            claimName: vault-data
