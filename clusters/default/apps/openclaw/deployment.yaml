apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      initContainers:
        - name: write-config
          image: busybox
          command:
            - sh
            - -c
            - |
              cat > /data/openclaw.json <<CONF
              {
                "gateway": {
                  "bind": "lan",
                  "trustedProxies": ["10.42.0.0/16"],
                  "auth": {
                    "token": "${GATEWAY_TOKEN}"
                  },
                  "controlUi": {
                    "allowedOrigins": ["*"],
                    "allowInsecureAuth": true
                  }
                }
              }
              CONF
          env:
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:2026.4.14
          ports:
            - name: http
              containerPort: 18789
          env:
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_SKIP_SERVICE_CHECK
              value: "true"
            - name: OLLAMA_API_KEY
              value: ollama-local
            - name: OLLAMA_BASE_URL
              value: http://ollama.ollama.svc.cluster.local:11434
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: gateway-token
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: openclaw-data
