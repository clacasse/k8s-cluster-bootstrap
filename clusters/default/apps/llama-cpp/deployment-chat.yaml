apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-chat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llama-chat
  template:
    metadata:
      labels:
        app: llama-chat
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      tolerations:
        - key: nvidia.com/gpu
          operator: Equal
          value: "true"
          effect: NoSchedule
      # Terminate cleanly on rollout. llama-server handles SIGTERM but the
      # pipeline flush can take a beat if a request is in-flight.
      terminationGracePeriodSeconds: 30
      initContainers:
        # Pull the GGUF to the PVC if it isn't already there. HF serves
        # public models without auth; we just curl through the redirect.
        # Skipping the download when the file exists keeps rollouts fast
        # and tolerates offline reboots.
        - name: pull-model
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /models
              dest="/models/${CHAT_MODEL_FILE}"
              if [ -s "$dest" ]; then
                echo "[pull-model] ${CHAT_MODEL_FILE} already present ($(stat -c%s "$dest") bytes), skipping"
                exit 0
              fi
              url="https://huggingface.co/${CHAT_MODEL_REPO}/resolve/main/${CHAT_MODEL_FILE}"
              echo "[pull-model] downloading ${url} -> ${dest}"
              tmp="${dest}.partial"
              # -f fails on HTTP errors, -L follows HF's 302 to the CDN,
              # -C - resumes if we were interrupted mid-download.
              curl -fL -C - -o "$tmp" "$url"
              mv "$tmp" "$dest"
              echo "[pull-model] done ($(stat -c%s "$dest") bytes)"
          envFrom:
            - configMapRef:
                name: llama-cpp-defaults
            - configMapRef:
                name: llama-cpp-model
                optional: true
          volumeMounts:
            - name: models
              mountPath: /models
      containers:
        - name: llama-server
          image: ghcr.io/ggml-org/llama.cpp:server-cuda-b8895
          ports:
            - name: http
              containerPort: 8080
          command:
            - sh
            - -c
            - |
              set -eu
              if [ -z "${CHAT_MODEL_FILE:-}" ]; then
                echo "[llama-chat] CHAT_MODEL_FILE is unset." >&2
                echo "[llama-chat] Run: cluster_manager.py llama setup" >&2
                exit 1
              fi
              # Conditional flags. --cpu-moe is presence-only and
              # --override-tensor is meaningful only when set; build them
              # into args strings so an empty/off value emits no flag at
              # all (avoids `--override-tensor ""` which llama-server
              # rejects as an empty regex).
              moe_args=""
              case "${CHAT_CPU_MOE:-off}" in
                on|true|1) moe_args="--cpu-moe" ;;
              esac
              override_args=""
              if [ -n "${CHAT_OVERRIDE_TENSOR:-}" ]; then
                override_args="--override-tensor ${CHAT_OVERRIDE_TENSOR}"
              fi
              # Flags composed from named ConfigMap fields so each is
              # discoverable + individually tunable via `llama set-*`.
              # CHAT_EXTRA_FLAGS is the escape hatch for anything not
              # yet promoted to its own field (e.g. --rope-scaling,
              # sampling defaults).
              exec /app/llama-server \
                --model "/models/${CHAT_MODEL_FILE}" \
                --alias "${CHAT_SERVED_MODEL}" \
                --host 0.0.0.0 \
                --port 8080 \
                --ctx-size "${CHAT_CTX_SIZE}" \
                -ngl "${CHAT_GPU_LAYERS}" \
                --parallel "${CHAT_PARALLEL_SLOTS}" \
                -ctk "${CHAT_KV_TYPE}" -ctv "${CHAT_KV_TYPE}" \
                --flash-attn "${CHAT_FLASH_ATTN}" \
                --reasoning-budget "${CHAT_REASONING_BUDGET}" \
                --repeat-penalty "${CHAT_REPEAT_PENALTY}" \
                --repeat-last-n "${CHAT_REPEAT_LAST_N}" \
                ${moe_args} \
                ${override_args} \
                --metrics --jinja \
                ${CHAT_EXTRA_FLAGS}
          envFrom:
            # Template-level defaults (embed model + common flags).
            - configMapRef:
                name: llama-cpp-defaults
            # Per-deployment operator config — chat model repo/file/alias/
            # ctx/flags. Created + updated by `cluster_manager.py llama
            # setup` and `llama set-chat`. Marked optional so a fresh
            # cluster boots the Argo app cleanly before first setup; the
            # pod will crashloop on missing CHAT_MODEL_FILE, which is the
            # intended signal that setup is required.
            - configMapRef:
                name: llama-cpp-model
                optional: true
          # The server boots by memory-mapping the GGUF, warming the KV
          # cache, and compiling CUDA kernels. On first cold start with a
          # 10 GB model this takes 30-60s; subsequent restarts with a
          # warm page cache are faster. Readiness probe generous enough
          # to cover the slow case.
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            # Don't kill the pod for "slow" — only for truly wedged. The
            # model-swap path can make /health take a while.
            initialDelaySeconds: 180
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              # The GPU node is dedicated to llama-chat — only system
              # DaemonSets (NFD, DCGM, device-plugin, node-exporter)
              # and k3s-agent share it, totaling ~1-2 GiB. With MoE
              # models running --cpu-moe, expert weights live in host
              # RAM (~15 GiB for 35B-A3B Q4_K_M) and CPU does the
              # expert FFN math every token, so both numbers below
              # reflect what we actually use during inference, not
              # idle. Request matches physical core count (9800X3D
              # is 8C/16T) so the scheduler reserves what we need
              # under load.
              cpu: "8"
              memory: 18Gi
              nvidia.com/gpu: "1"
            limits:
              # Host has 32 GiB; reserve ~2 GiB for OS + DaemonSets
              # and give the rest to llama-chat. Headroom matters for
              # MoE: peak RSS = mmap'd experts (~15 GiB) + working
              # buffers (~3 GiB) + prompt-cache snapshot spikes
              # (+2-4 GiB transient) ≈ 20-24 GiB steady, ~26 GiB peak.
              # The 30 GiB cap leaves ~4-6 GiB above peak so spikes
              # don't OOMKill. Bump only if we move to a larger
              # quant or push --ctx-size past 64k.
              # CPU burst up to all 16 logical threads — SMT gives
              # llama.cpp a modest 1.2-1.5x throughput bump on MoE
              # expert FFN. No other workloads on this node, so
              # there's nothing to share with.
              cpu: "16"
              memory: 30Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: models
              mountPath: /models
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: llama-chat-models
