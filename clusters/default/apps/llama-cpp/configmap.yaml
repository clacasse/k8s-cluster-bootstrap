# Model + server configuration for the llama.cpp stack.
#
# Swap the chat or embed model by editing CHAT_MODEL_* / EMBED_MODEL_* here
# and letting Argo reconcile — the init container pulls the GGUF to the PVC
# if it isn't there yet, and llama-server reloads on pod restart.
#
# Keep the *_CHAT_SERVED_MODEL and *_EMBED_SERVED_MODEL values pointed at
# the same logical name the OpenAI-compatible clients (OpenClaw, rag-*)
# expect — llama.cpp uses `--alias` to control the `model` field in
# /v1/models responses.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-cpp-config
data:
  # --- Chat model ---
  # Qwen3.6-27B-Instruct at Q4_K_M: ~16.8 GB of weights — doesn't fit all
  # on the RTX 5080 (16 GB). Architecture from the GGUF metadata:
  # 64 transformer layers, hidden=5120, 24 attn heads / 4 KV heads (GQA
  # 6:1) — the small KV head count keeps the KV cache manageable even
  # with partial CPU offload.
  #
  # VRAM budget with `-ngl 52` (52/64 layers on GPU) at 32k ctx:
  #   52 layers × ~237 MB weight  ≈ 12.3 GB
  #   LM head / output tensor     ≈ 0.5 GB
  #   CUDA0 KV cache (32k, q8_0)  ≈ 0.9 GB
  #   CUDA0 RS (hybrid SSM state) ≈ 0.5 GB
  #   Compute buffer + frag       ≈ 0.4 GB
  #   ─────────────────────────   ─ ~14.6 GB (leaves ~1.7 GB headroom)
  # The other 13 layers (~3.7 GB) live in system RAM and are stepped
  # through on CPU for every token. 9800X3D at DDR5 lands generation
  # at ~12 tok/s vs ~80 tok/s all-GPU with 14B — the hybrid
  # transformer+SSM architecture (arch=qwen35) is memory-bandwidth
  # bound on the CPU-resident layers.
  #
  # 32k context was chosen to fit OpenClaw's compaction prompts —
  # long sessions produce summarize-this prompts of 25-27k tokens, and
  # anything below 32k trips a retry loop where llama-server returns
  # 400 ("request exceeds context size") and OpenClaw doesn't shrink.
  #
  # To tune: watch `llm_load_tensors: offloaded N/64 layers` in the
  # llama-server startup log, plus `CUDA0 buffer size = X MiB`. If the
  # GPU buffer lands below ~13 GB, push ngl up; if it OOMs on load,
  # push ngl down.
  CHAT_MODEL_REPO: "unsloth/Qwen3.6-27B-GGUF"
  CHAT_MODEL_FILE: "Qwen3.6-27B-Q4_K_M.gguf"
  # Name reported via /v1/models — OpenClaw picks an entry by id, so keep
  # this matched with the model id in openclaw.json.
  CHAT_SERVED_MODEL: "qwen3.6-27b"
  CHAT_CTX_SIZE: "32768"
  # `-t 8` pins to the 9800X3D's 8 physical cores (all on the single
  # cache-enabled CCD); over-threading onto SMT siblings causes cache
  # thrash for CPU matmul. Flash-attention + q8_0 KV cache drop KV
  # memory ~4x vs FP16 with no measurable quality hit on Qwen3.
  CHAT_EXTRA_FLAGS: "-ngl 52 -t 8 --flash-attn on -ctk q8_0 -ctv q8_0 --metrics --jinja"

  # --- Embedding model ---
  # nomic-embed-text-v1.5 is 768-dim, same as the old Ollama pull. The
  # existing Chroma collection's vectors are therefore compatible; we do
  # NOT need to reindex the vault.
  EMBED_MODEL_REPO: "nomic-ai/nomic-embed-text-v1.5-GGUF"
  EMBED_MODEL_FILE: "nomic-embed-text-v1.5.Q8_0.gguf"
  EMBED_SERVED_MODEL: "nomic-embed-text"
  # The nomic model trains at 2048; longer ctx is wasted and slows batching.
  EMBED_CTX_SIZE: "2048"
  EMBED_EXTRA_FLAGS: "--embeddings --metrics --pooling mean"
