# Template-level, Argo-managed llama.cpp defaults.
#
# Holds sensible defaults for every tunable knob the llama-chat and
# llama-embed deployments read via envFrom. Per-deployment overrides
# live in a separate, imperatively-managed `llama-cpp-model` ConfigMap
# written by `cluster_manager.py llama setup` / `llama set-*` / etc.
# The pod's envFrom lists llama-cpp-model AFTER this one, so any key
# set there wins. Keys NOT present in llama-cpp-model fall through to
# the defaults below.
#
# This lets the template ship reasonable behavior without prescribing
# a specific model. A fresh fork boots, crashloops on the missing
# CHAT_MODEL_FILE (intended signal), operator runs `llama setup` and
# picks their model — all other knobs get the defaults from here
# unless they override them too.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-cpp-defaults
data:
  # --- Chat model defaults (operator MUST override CHAT_MODEL_*) ---
  # The repo/file/alias keys are intentionally NOT defaulted — the
  # template has no opinion about which chat model a given deployment
  # runs. Operator sets these via `llama setup`.
  # CHAT_MODEL_REPO   = must-set
  # CHAT_MODEL_FILE   = must-set
  # CHAT_SERVED_MODEL = must-set
  #
  # The remaining knobs get defaults that work for most 14-30B class
  # models on a 16 GB-class consumer GPU. Tune via:
  #   llama set-chat ... --ctx N --ngl N --kv-type TYPE --parallel N --flash-attn on|off|auto
  #   llama set-ctx N  /  llama set-ngl N  /  llama set-kv-type TYPE  /  etc.
  CHAT_CTX_SIZE: "32768"           # context window; safe inside 32k-native-trained models
  CHAT_GPU_LAYERS: "999"           # 999 = "all on GPU"; llama-server clamps to actual layer count
  # --parallel DIVIDES the total context across slots (each slot gets
  # ctx/parallel tokens). 1 = the full 32k is available per request,
  # at the cost of not serving concurrent requests in parallel. This
  # matches the agent workflow: the agent issues sequential calls, each
  # of which can legitimately use the full context for long compaction
  # prompts. Bump this only if you have genuinely concurrent clients
  # AND each request fits in the smaller per-slot ctx.
  CHAT_PARALLEL_SLOTS: "1"
  CHAT_KV_TYPE: "q8_0"             # KV cache dtype; applied to both K and V
  CHAT_FLASH_ATTN: "on"            # Blackwell/Ada have it; Ampere partial
  # Token budget for thinking models (Qwen3, DeepSeek-R1, ...): -1 unrestricted,
  # 0 = immediate end-of-thinking. Default 0 because thinking-block tokens
  # generated during one turn don't match the chat template's rendering of
  # those same messages on the *next* turn (the template strips/wraps think
  # blocks based on position), which invalidates llama.cpp's prompt cache and
  # forces multi-thousand-token reprocess every agent loop iteration. Set to
  # -1 if you want full CoT and don't mind the cache hit.
  CHAT_REASONING_BUDGET: "0"

  # --- Sampling: repetition control (intentionally unset) ---
  # CHAT_REPEAT_PENALTY and CHAT_REPEAT_LAST_N are NOT defaulted at
  # the template level. The startup script in deployment-chat.yaml
  # only emits the corresponding llama-server flags when these are
  # set, so leaving them blank means llama-server uses its own
  # built-in defaults (penalty 1.0 = no penalty, last_n 64).
  #
  # Why: penalty != 1.0 is a model-and-workload-specific intervention,
  # not a global preference. Qwen3.6-A3B benefits from ~1.15 to tame
  # degenerate "NO_REPLY" / single-token loops on short-reply tasks;
  # but agentic coding workloads (pi.dev, Claude Code-style) often
  # legitimately repeat similar tool-call shapes, where the penalty
  # makes the model substitute "Already done." for the next call and
  # the agent stalls.
  #
  # Operators set these per-deployment via:
  #   cluster_manager.py llama set-repeat-penalty <float>
  #   cluster_manager.py llama set-repeat-last-n <int>
  # An empty/absent value disables the flag entirely.

  # --- MoE expert offloading ---
  # `on` adds --cpu-moe so MoE expert FFN tensors stay in host RAM and
  # only the shared/attention path lives on GPU. This is what lets a
  # ~35B-param MoE (e.g. Qwen3-A3B's 35B/3B-active) run on a 16 GB-class
  # GPU at all: dense attention + router on-device, expert weights memory-
  # mapped from the GGUF in CPU RAM, dispatched per-token. Cost is the
  # decode-rate hit from CPU FFN math (still fast on a Zen 5 / 9800X3D)
  # and the host RAM footprint of the experts (~15 GiB for 35B-A3B Q4_K_M).
  # `off` for dense models — they fit fully on GPU and don't need this.
  CHAT_CPU_MOE: "off"
  # Partial-offload variant: pin the FIRST N expert FFN layers to CPU,
  # leave the rest on GPU. Useful when you have just enough VRAM headroom
  # to keep some experts on-device but not all — split the difference for
  # a token-rate win over full --cpu-moe. 0 disables (== --cpu-moe off).
  # Mutually exclusive with CHAT_CPU_MOE=on; if both are set, llama-server
  # honors --cpu-moe (everything to CPU) and ignores --n-cpu-moe.
  CHAT_N_CPU_MOE: "0"
  # Lower-level placement override. llama.cpp regex matches tensor names
  # and pins matches to the named device. Use this when --cpu-moe's blanket
  # "all experts to CPU" is too coarse — e.g. keep the first N expert
  # layers on GPU for latency, push the rest to CPU. Empty by default
  # because --cpu-moe covers the common case; only reach for this when
  # profiling shows a specific layer pattern would help.
  # Example: '\.ffn_.*_exps\.=CPU' (== --cpu-moe). Quote-safe regex only
  # — passed unquoted into the exec line.
  CHAT_OVERRIDE_TENSOR: ""

  # Unified KV cache across slots. With --kv-unified the per-slot KV
  # buffers share one allocation pool, which is what unlocks llama-server's
  # --cache-idle-slots behavior (idle slot KV cache is retained across
  # slot reassignments instead of being reclaimed). On a 2-slot setup
  # where the watcher and interactive agent each own a slot, this keeps
  # the idle slot warm across switches — matters when the gap between a
  # slot's turns is long enough that its prefix would otherwise drop.
  # Default off because it's a behavioral change worth opting into per
  # deployment; enable on multi-slot setups where idle-slot eviction is
  # measurable in TTFT.
  CHAT_KV_UNIFIED: "off"

  CHAT_EXTRA_FLAGS: ""             # escape hatch for flags not yet promoted to named fields

  # --- Embedding model ---
  # nomic-embed-text-v1.5 is 768-dim, same as the old Ollama pull. The
  # existing Chroma collection's vectors are therefore compatible; we
  # do NOT need to reindex the vault. Changing embed dim requires
  # re-indexing — see `cluster_manager.py restart --wipe-rag`.
  EMBED_MODEL_REPO: "nomic-ai/nomic-embed-text-v1.5-GGUF"
  EMBED_MODEL_FILE: "nomic-embed-text-v1.5.Q8_0.gguf"
  EMBED_SERVED_MODEL: "nomic-embed-text"
  EMBED_CTX_SIZE: "2048"           # nomic trains at 2048; longer is wasted
  EMBED_POOLING: "mean"            # mean / cls / last; nomic uses mean
  EMBED_PARALLEL_SLOTS: "2"        # embed requests batch well, 2 is plenty
  EMBED_EXTRA_FLAGS: ""
