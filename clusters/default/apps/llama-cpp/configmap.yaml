# Model + server configuration for the llama.cpp stack.
#
# Swap the chat or embed model by editing CHAT_MODEL_* / EMBED_MODEL_* here
# and letting Argo reconcile — the init container pulls the GGUF to the PVC
# if it isn't there yet, and llama-server reloads on pod restart.
#
# Keep the *_CHAT_SERVED_MODEL and *_EMBED_SERVED_MODEL values pointed at
# the same logical name the OpenAI-compatible clients (OpenClaw, rag-*)
# expect — llama.cpp uses `--alias` to control the `model` field in
# /v1/models responses.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-cpp-config
data:
  # --- Chat model ---
  # Qwen3-14B-Instruct at Q5_K_M: ~10.5 GB of weights, fits fully on the
  # RTX 5080 (16 GB). Architecture: 40 transformer layers, hidden=5120,
  # 40 attn heads / 8 KV heads (GQA 5:1). No CPU offload needed.
  #
  # VRAM budget at 64k ctx, all layers on GPU:
  #   Model weights (Q5_K_M)      ≈ 10.5 GB
  #   CUDA0 KV cache (64k, q8_0)  ≈ 3.0 GB
  #   Compute buffer + frag       ≈ 0.8 GB
  #   ─────────────────────────   ─ ~14.3 GB (leaves ~2 GB headroom)
  #
  # 64k context chosen for room to breathe in long agent sessions with
  # multi-tool orchestration — the compactor builds prompts up to ~25-27k
  # tokens on busy sessions and 32k was cutting it too close. If the
  # CUDA0 KV buffer at load time overshoots ~3 GB, drop CHAT_CTX_SIZE
  # back to 32768 — the model itself fits with huge margin at either.
  #
  # Speed: expect ~80 tok/s generation, ~500-1000 tok/s prompt
  # processing on the 5080 at Q5_K_M all-GPU. Dramatic improvement over
  # the previous 27B partial-offload setup (~12 tok/s gen) which paid
  # the CPU-layers-via-DDR5 tax on every token.
  CHAT_MODEL_REPO: "bartowski/Qwen_Qwen3-14B-GGUF"
  CHAT_MODEL_FILE: "Qwen_Qwen3-14B-Q5_K_M.gguf"
  # Name reported via /v1/models — OpenClaw picks an entry by id, so keep
  # this matched with the model id in openclaw.json + the openclaw-model
  # ConfigMap's active-model key (imperatively managed, not in git).
  CHAT_SERVED_MODEL: "qwen3-14b"
  CHAT_CTX_SIZE: "65536"
  # -ngl 999 = "all layers on GPU" (llama-server clamps to actual layer
  # count). No -t flag needed since CPU isn't in the inference path.
  CHAT_EXTRA_FLAGS: "-ngl 999 --flash-attn on -ctk q8_0 -ctv q8_0 --metrics --jinja"

  # --- Embedding model ---
  # nomic-embed-text-v1.5 is 768-dim, same as the old Ollama pull. The
  # existing Chroma collection's vectors are therefore compatible; we do
  # NOT need to reindex the vault.
  EMBED_MODEL_REPO: "nomic-ai/nomic-embed-text-v1.5-GGUF"
  EMBED_MODEL_FILE: "nomic-embed-text-v1.5.Q8_0.gguf"
  EMBED_SERVED_MODEL: "nomic-embed-text"
  # The nomic model trains at 2048; longer ctx is wasted and slows batching.
  EMBED_CTX_SIZE: "2048"
  EMBED_EXTRA_FLAGS: "--embeddings --metrics --pooling mean"
