# Template-level, Argo-managed llama.cpp defaults.
#
# This ConfigMap holds only the keys that do NOT vary per deployment:
# the embedding model + its server flags. Changing the embedding model
# invalidates the existing Chroma collection (different vector space)
# so it's treated as a deliberate infrastructure change, not a runtime
# knob — it lives here in git where a change requires a commit.
#
# The *chat* model is intentionally NOT here. Chat model choice is a
# per-deployment operator decision — pinning a specific model in the
# upstream template would force every fork to inherit one person's
# taste and VRAM budget. Instead, chat config lives in a separate
# ConfigMap `llama-cpp-model` that is created imperatively by
# `cluster_manager.py llama setup`, and updated by `llama set-chat`.
# That one is not reconciled by Argo, so runtime edits persist.
#
# The llama-chat deployment envFroms BOTH ConfigMaps, with
# `llama-cpp-model` marked optional so a fresh cluster can boot the
# llama-cpp Argo app before the operator has run `llama setup` —
# the pod will then crashloop on missing CHAT_MODEL_FILE, which is
# the intended signal that setup is required.
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-cpp-defaults
data:
  # --- Embedding model ---
  # nomic-embed-text-v1.5 is 768-dim, same as the old Ollama pull. The
  # existing Chroma collection's vectors are therefore compatible; we do
  # NOT need to reindex the vault. Changing this value requires
  # re-indexing — see `cluster_manager.py restart --wipe-rag`.
  EMBED_MODEL_REPO: "nomic-ai/nomic-embed-text-v1.5-GGUF"
  EMBED_MODEL_FILE: "nomic-embed-text-v1.5.Q8_0.gguf"
  EMBED_SERVED_MODEL: "nomic-embed-text"
  # The nomic model trains at 2048; longer ctx is wasted and slows batching.
  EMBED_CTX_SIZE: "2048"
  EMBED_EXTRA_FLAGS: "--embeddings --metrics --pooling mean"
