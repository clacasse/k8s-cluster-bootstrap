apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: garage
  namespace: garage
spec:
  serviceName: garage
  replicas: 1
  selector:
    matchLabels:
      app: garage
  template:
    metadata:
      labels:
        app: garage
    spec:
      # Pin to the storage node. garage-auth Secret is created by
      # `cluster_manager.py bootstrap-infra-secrets` after first sync.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - { key: role, operator: In, values: ["storage"] }
      tolerations:
        - { key: role, operator: Equal, value: storage, effect: NoSchedule }
      securityContext:
        fsGroup: 65534
      containers:
        - name: garage
          # Verify the latest stable tag in your fork; v1.2.0 is known-good as of
          # this writing. Also pinnable to a digest for reproducibility.
          image: dxflrs/garage:v1.2.0
          imagePullPolicy: IfNotPresent
          # Image has no ENTRYPOINT; be explicit about both command and args.
          command: ["/garage"]
          args: ["server"]
          ports:
            - { name: s3,    containerPort: 3900 }
            - { name: rpc,   containerPort: 3901 }
            - { name: admin, containerPort: 3903 }
          env:
            - name: RUST_LOG
              value: "garage=info"
            - name: GARAGE_RPC_SECRET
              valueFrom:
                secretKeyRef: { name: garage-auth, key: rpc_secret }
            - name: GARAGE_ADMIN_TOKEN
              valueFrom:
                secretKeyRef: { name: garage-auth, key: admin_token }
            - name: GARAGE_METRICS_TOKEN
              valueFrom:
                secretKeyRef: { name: garage-auth, key: metrics_token }
          volumeMounts:
            - { name: config, mountPath: /etc/garage.toml, subPath: garage.toml }
            - { name: data,   mountPath: /var/lib/garage }
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { memory: 1Gi }
          readinessProbe:
            tcpSocket: { port: 3900 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 3900 }
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          configMap:
            name: garage-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 50Gi
