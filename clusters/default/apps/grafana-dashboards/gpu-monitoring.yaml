apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-gpu-monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu-monitoring.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "templating": {
        "list": [
          {
            "name": "node",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(DCGM_FI_DEV_GPU_TEMP, Hostname)",
            "includeAll": true,
            "allValue": ".*",
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2,
            "sort": 1,
            "label": "GPU Node"
          }
        ]
      },
      "panels": [
        {
          "title": "GPU Temperature",
          "description": "Current GPU die temperature. Throttling typically starts at 83\u00b0C.",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 60 },
                  { "color": "orange", "value": 75 },
                  { "color": "red", "value": 85 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{Hostname=~\"$node\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "title": "GPU Utilization",
          "description": "Percentage of time the GPU is executing work. 0% = idle, 100% = fully loaded.",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{Hostname=~\"$node\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "title": "GPU Memory Used",
          "description": "Video memory in use. When full, model loading fails or performance degrades.",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "decmbytes",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 8000 },
                  { "color": "red", "value": 12000 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{Hostname=~\"$node\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "title": "GPU Power Draw",
          "description": "Current power consumption in watts.",
          "type": "gauge",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "watt",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 200 },
                  { "color": "red", "value": 300 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{Hostname=~\"$node\"}",
              "legendFormat": ""
            }
          ]
        },
        {
          "title": "Temperature History",
          "description": "GPU die temperature over time. Sustained high temps reduce GPU lifespan.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "celsius", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_TEMP{Hostname=~\"$node\"}",
              "legendFormat": "Temperature"
            }
          ]
        },
        {
          "title": "Utilization History",
          "description": "GPU compute utilization over time. Useful for spotting inference load patterns.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL{Hostname=~\"$node\"}",
              "legendFormat": "Utilization"
            }
          ]
        },
        {
          "title": "Memory History",
          "description": "GPU memory allocation over time. Shows how much VRAM your models consume.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "decmbytes" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED{Hostname=~\"$node\"}",
              "legendFormat": "Used"
            },
            {
              "expr": "DCGM_FI_DEV_FB_FREE{Hostname=~\"$node\"}",
              "legendFormat": "Free"
            }
          ]
        },
        {
          "title": "Power History",
          "description": "GPU power consumption over time.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "watt" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE{Hostname=~\"$node\"}",
              "legendFormat": "Power"
            }
          ]
        },
        {
          "title": "Clock Speeds",
          "description": "Current GPU and memory clock speeds. Drops when idle, boosts under load.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "clockhertz" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_SM_CLOCK{Hostname=~\"$node\"} * 1000000",
              "legendFormat": "SM Clock"
            },
            {
              "expr": "DCGM_FI_DEV_MEM_CLOCK{Hostname=~\"$node\"} * 1000000",
              "legendFormat": "Memory Clock"
            }
          ]
        },
        {
          "title": "Encoder / Decoder",
          "description": "Hardware video encode/decode utilization. Only relevant for video workloads.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_ENC_UTIL{Hostname=~\"$node\"}",
              "legendFormat": "Encoder"
            },
            {
              "expr": "DCGM_FI_DEV_DEC_UTIL{Hostname=~\"$node\"}",
              "legendFormat": "Decoder"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["gpu", "nvidia"],
      "time": { "from": "now-1h", "to": "now" },
      "title": "GPU Monitoring",
      "uid": "gpu-monitoring"
    }
