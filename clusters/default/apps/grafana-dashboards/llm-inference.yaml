# llama.cpp dashboard — replaces the Ollama-specific one removed when we
# migrated off Ollama. Panels use the `llamacpp:*` Prometheus metrics that
# llama-server exposes on /metrics (see --metrics in the ConfigMap).
#
# Label note: kube-prometheus-stack's default ServiceMonitor relabeling
# does NOT forward arbitrary Kubernetes labels (like our app=llama-chat)
# onto scraped samples. Metrics come out labeled with the canonical
# Prometheus set — `job`, `service`, `pod`, `namespace`, `container`,
# `endpoint`, `instance`. We filter on `job=~"llama-chat|llama-embed"`
# (job name is auto-set from the ServiceMonitor resource name).
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-llm-inference
  labels:
    grafana_dashboard: "1"
data:
  llm-inference.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "title": "LLM Inference (llama.cpp)",
      "panels": [
        {
          "title": "Tokens Per Second (generation)",
          "description": "How fast each llama-server generates output tokens. Uses the built-in gauge which is smoothed server-side.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "llamacpp:predicted_tokens_seconds{job=~\"llama-chat|llama-embed\"}",
              "legendFormat": "{{job}} gen tok/s"
            }
          ]
        },
        {
          "title": "Tokens Per Second (prompt)",
          "description": "Prompt-processing throughput — the ingest side. Much higher than generation because prompt tokens parallelize.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "llamacpp:prompt_tokens_seconds{job=~\"llama-chat|llama-embed\"}",
              "legendFormat": "{{job}} prompt tok/s"
            }
          ]
        },
        {
          "title": "Requests In Flight",
          "description": "Processing = slots actively decoding; Deferred = requests queued because all slots are busy. Sustained non-zero deferred means the server is saturated.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "llamacpp:requests_processing{job=~\"llama-chat|llama-embed\"}",
              "legendFormat": "{{job}} processing"
            },
            {
              "expr": "llamacpp:requests_deferred{job=~\"llama-chat|llama-embed\"}",
              "legendFormat": "{{job}} deferred"
            }
          ]
        },
        {
          "title": "Largest Observed Prompt",
          "description": "High-water mark of request size in tokens, across all slots. Approaching CHAT_CTX_SIZE (32768) means you're about to hit \"request exceeds context size\" rejections. llama.cpp doesn't expose live KV-cache usage as a metric, so this high-water is the best proxy for context pressure.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "llamacpp:n_tokens_max{job=~\"llama-chat|llama-embed\"}",
              "legendFormat": "{{job}} max n_tokens"
            }
          ]
        },
        {
          "title": "Decode Throughput (rate-based)",
          "description": "Independent cross-check on the smoothed gen tok/s panel: computes generation rate from the raw counter over a 5-minute window. Diverging from the top-left panel means the server's smoothing is lagging recent activity.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(llamacpp:tokens_predicted_total{job=~\"llama-chat|llama-embed\"}[5m])",
              "legendFormat": "{{job}} tok/s (5m rate)"
            }
          ]
        },
        {
          "title": "GPU VRAM Utilization",
          "description": "Whole-GPU memory usage from DCGM — cross-checks that the chat model fits. Not joinable to llama-server instance labels, so it's one line per physical GPU.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED * 1024 * 1024",
              "legendFormat": "VRAM used ({{Hostname}})"
            },
            {
              "expr": "(DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) * 1024 * 1024",
              "legendFormat": "VRAM total ({{Hostname}})"
            }
          ]
        },
        {
          "title": "llama-chat CPU Usage",
          "description": "Container CPU consumption (cores). With --cpu-moe, expert FFN math runs on CPU every token, so this should rise to ~6-10 cores under sustained load. Was near-zero on the dense GPU-only model.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"llama-cpp\",pod=~\"llama-chat-.*\",container=\"llama-server\"}[1m])",
              "legendFormat": "{{pod}} cores"
            }
          ]
        },
        {
          "title": "llama-chat CPU Throttling",
          "description": "CFS throttling rate — non-zero means the container hit its CPU limit and got descheduled mid-token. Directly explains slow tok/s. If sustained, raise the CPU limit.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 24 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(container_cpu_cfs_throttled_seconds_total{namespace=\"llama-cpp\",pod=~\"llama-chat-.*\"}[1m])",
              "legendFormat": "{{pod}} throttled s/s"
            }
          ]
        },
        {
          "title": "llama-chat Memory: Working Set vs Page Cache",
          "description": "Working set = RSS-equivalent that counts against the cgroup limit. Page cache = mmap'd file pages (where MoE expert weights live). With --cpu-moe most of the GGUF should show up as cache, with working set bounded by buffers + KV scratch + Node overhead. Limit line at 30 GiB for headroom check.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"llama-cpp\",pod=~\"llama-chat-.*\",container=\"llama-server\"}",
              "legendFormat": "{{pod}} working set"
            },
            {
              "expr": "container_memory_cache{namespace=\"llama-cpp\",pod=~\"llama-chat-.*\",container=\"llama-server\"}",
              "legendFormat": "{{pod}} page cache"
            },
            {
              "expr": "kube_pod_container_resource_limits{namespace=\"llama-cpp\",pod=~\"llama-chat-.*\",container=\"llama-server\",resource=\"memory\"}",
              "legendFormat": "{{pod}} limit"
            }
          ]
        },
        {
          "title": "GPU Node Per-Core CPU Utilization",
          "description": "Per-logical-core busy %. With 8C/16T on the 9800X3D, llama.cpp's MoE expert FFN should spread reasonably evenly. Hot bands on a subset of cores suggest the --threads / --threads-batch settings need tuning to use the rest.",
          "type": "heatmap",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "100 - (rate(node_cpu_seconds_total{instance=~\"k3s-gpu.*\",mode=\"idle\"}[1m]) * 100)",
              "legendFormat": "core {{cpu}}",
              "format": "time_series"
            }
          ]
        },
        {
          "title": "GPU PCIe Throughput",
          "description": "PCIe TX (GPU→host) and RX (host→GPU) bytes/sec. The MoE-on-CPU pattern shuttles activation vectors between GPU attention and CPU expert layers every token, so non-trivial sustained traffic during inference is expected. Below ~5 GB/s is healthy; pushing the PCIe 5.0 x16 ceiling (~16 GB/s) means PCIe is the bottleneck and gains from larger MoE quants would be limited.",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 40 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "Bps" },
            "overrides": []
          },
          "targets": [
            {
              "expr": "DCGM_FI_PROF_PCIE_TX_BYTES{Hostname=~\"k3s-gpu.*\"}",
              "legendFormat": "TX (GPU→host)"
            },
            {
              "expr": "DCGM_FI_PROF_PCIE_RX_BYTES{Hostname=~\"k3s-gpu.*\"}",
              "legendFormat": "RX (host→GPU)"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "refresh": "30s"
    }
