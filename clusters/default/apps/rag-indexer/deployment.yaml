apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-indexer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rag-indexer
  template:
    metadata:
      labels:
        app: rag-indexer
    spec:
      containers:
        - name: rag-indexer
          image: ghcr.io/clacasse/k8s-cluster-bootstrap/rag-indexer:latest
          env:
            - name: VAULT_PATH
              value: /vault
            - name: CHROMADB_URL
              value: http://chromadb.openclaw.svc.cluster.local:8000
            - name: OLLAMA_URL
              value: http://ollama-metrics.ollama.svc.cluster.local:11434
            - name: EMBED_MODEL
              value: nomic-embed-text
            - name: POLL_INTERVAL
              value: "30"
            - name: EXCLUDE_PATTERNS
              value: ".obsidian,node_modules,.git,.trash"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: vault
              mountPath: /vault
              readOnly: true
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: obsidian-vault
