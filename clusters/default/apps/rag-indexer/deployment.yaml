apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-indexer
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: rag-indexer
  template:
    metadata:
      labels:
        app: rag-indexer
    spec:
      containers:
        - name: rag-indexer
          image: ghcr.io/IMAGE_REPO/rag-indexer:latest
          env:
            - name: VAULT_PATH
              value: /vault
            - name: CHROMADB_URL
              value: http://chromadb.rag.svc.cluster.local:8000
            # llama-embed exposes OpenAI-compatible /v1/embeddings. The
            # EMBED_MODEL name must match the --alias baked into the
            # llama.cpp chat/embed ConfigMap (EMBED_SERVED_MODEL) — if they
            # drift, the embeddings call returns "model not found".
            - name: LLAMA_URL
              value: http://llama-embed.llama-cpp.svc.cluster.local:8080
            - name: EMBED_MODEL
              value: nomic-embed-text
            - name: POLL_INTERVAL
              value: "30"
            - name: EXCLUDE_PATTERNS
              value: ".obsidian,node_modules,.git,.trash"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: vault
              mountPath: /vault
              readOnly: true
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: rag-vault
