# Hermes model selection — the active served-as alias from llama-chat
# (CHAT_SERVED_MODEL). Read by the bootstrap-config init container,
# which writes it into /opt/data/config.yaml under model.default.
#
# Kept as a separate ConfigMap (rather than inline in the deployment)
# so `cluster_manager.py llama set-chat` can update it directly without
# editing the manifest. Bumps via the CLI persist across Argo syncs
# (it's an imperative resource Argo doesn't reconcile).
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-model
data:
  active-model: qwen3.6-35b-a3b
