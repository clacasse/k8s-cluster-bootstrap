# Hermes model selection — the active served-as alias from llama-chat
# (CHAT_SERVED_MODEL). Read by the bootstrap-config init container,
# which writes it into /opt/data/config.yaml under model.default.
#
# Kept as a separate ConfigMap (rather than inline in the deployment)
# so a future change can have `cluster_manager.py llama set-chat`
# update both `openclaw/openclaw-model` and `hermes/hermes-model` in
# lockstep — same pattern as openclaw-model already uses today.
#
# Until that wiring lands, this value is the source of truth for Hermes
# and bumps require either editing this file + Argo sync, or a manual
# `kubectl patch cm hermes-model`.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-model
data:
  active-model: qwen3.6-35b-a3b
