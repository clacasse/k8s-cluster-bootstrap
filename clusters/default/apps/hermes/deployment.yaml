apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC — only one pod can mount at a time
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # Co-locate with openclaw on k3s-control. Three reasons: (a) keeps
      # the perf comparison fair (same node, same storage class), (b) the
      # obsidian-sync sidecar lives there if/when we add a hermes-side
      # vault PVC, (c) leaves the GPU and storage nodes single-purpose.
      #
      # Use nodeSelector, NOT nodeName: setting nodeName directly bypasses
      # the scheduler, and the local-path provisioner depends on the
      # scheduler's volume.kubernetes.io/selected-node annotation to
      # provision PVCs. Skipping the scheduler hangs the PVC in Pending
      # forever.
      nodeSelector:
        kubernetes.io/hostname: k3s-control
      initContainers:
        # Bootstrap /opt/data/config.yaml so the model points at our
        # local llama.cpp endpoint instead of the OpenRouter+Claude
        # default the image's entrypoint would otherwise seed.
        #
        # Runs before the gateway and dashboard containers — they share
        # the same /opt/data PVC. Idempotent: every boot re-applies the
        # overlay, so editing this manifest (or the hermes-model
        # ConfigMap) is enough to redirect Hermes; no manual
        # `hermes config set` ever needed.
        #
        # Falls back to seeding /opt/data/config.yaml from the bundled
        # cli-config.yaml.example on a fresh PVC, then overlays our
        # values on top — preserves all the non-model defaults
        # (compaction, terminal, memory, session reset, etc.).
        - name: bootstrap-config
          image: docker.io/nousresearch/hermes-agent:v2026.4.23
          command: ["sh", "-c"]
          args:
            - |
              set -e
              cfg=/opt/data/config.yaml
              H=/opt/hermes/.venv/bin/hermes
              if [ ! -f "$cfg" ]; then
                cp /opt/hermes/cli-config.yaml.example "$cfg"
                echo "[bootstrap] seeded $cfg from cli-config.yaml.example"
              fi
              export HERMES_HOME=/opt/data
              "$H" config set model.default  "$MODEL_DEFAULT"
              "$H" config set model.provider "$MODEL_PROVIDER"
              "$H" config set model.base_url "$MODEL_BASE_URL"
              # The init container runs as root; the main container runs
              # as UID 10000. Without this chown the gateway can't edit
              # config.yaml at runtime (e.g. via dashboard or `hermes
              # setup`). The image entrypoint chowns the directory but
              # not files inside that we created.
              chown -R 10000:10000 /opt/data
              echo "[bootstrap] applied model overlay"
          env:
            - name: MODEL_DEFAULT
              valueFrom:
                configMapKeyRef:
                  name: hermes-model
                  key: active-model
            - name: MODEL_PROVIDER
              value: custom
            - name: MODEL_BASE_URL
              value: http://llm-proxy.llama-cpp.svc.cluster.local:8080/v1
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          # Upstream image — pinned to a tagged release rather than :latest
          # so we control when we move forward. Bump deliberately, the same
          # way we bump openclaw_image in ansible/group_vars/all.yml.
          image: docker.io/nousresearch/hermes-agent:v2026.4.23
          # The image's default ENTRYPOINT is `hermes` (the interactive
          # TUI) which exits immediately under k8s. Override args to run
          # the messaging gateway in the foreground — this is the path
          # the upstream docs recommend for Docker / non-systemd hosts.
          args:
            - gateway
            - run
          env:
            # Hermes config root. Default is /opt/data per the image; setting
            # explicitly so the value is visible in the manifest.
            - name: HERMES_HOME
              value: /opt/data
            # Local llama.cpp via the same llm-proxy openclaw uses. The
            # proxy logs every request as JSONL, so we can compare hermes-
            # vs-openclaw prompt shapes without enabling llama.cpp's own
            # slow-path logger.
            - name: HERMES_INFERENCE_PROVIDER
              value: custom
            - name: OPENAI_BASE_URL
              value: http://llm-proxy.llama-cpp.svc.cluster.local:8080/v1
            - name: OPENAI_API_KEY
              value: hermes-local   # placeholder; llama.cpp ignores auth
            # NOTE: HERMES_MODEL was removed — per Hermes docs it only
            # affects the cron scheduler, not chat. The chat path reads
            # model.default from /opt/data/config.yaml, which the
            # bootstrap-config init container above keeps in sync with
            # the hermes-model ConfigMap.
            # Telegram bot token. Same key name as openclaw-secrets so the
            # operator can copy the value cross-namespace with one kubectl
            # command. Marked optional so the pod boots cleanly before
            # the secret exists; Hermes silently skips Telegram in that case.
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: telegram-bot-token
                  optional: true
          # Hermes spins up Playwright + Chromium plus a FastAPI backend
          # plus the messaging gateway. 1 GiB baseline is generous; the
          # FTS5 session DB can grow but its working set stays small.
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            # Hermes-side vault, populated by the obsidian-sync sidecar
            # in this namespace. Empty until setup-obsidian --target hermes
            # has been run.
            - name: vault
              mountPath: /vault
        # Web dashboard sidecar. Hermes splits the gateway (messaging +
        # cron) and the dashboard (FastAPI/React UI for config/sessions)
        # into separate processes; running both as sidecars in one pod
        # lets them share /opt/data without an extra Deployment.
        # `--insecure` is required to bind off 127.0.0.1 — the dashboard
        # refuses by default because it exposes provider API keys via
        # its config-edit endpoints. We accept that here because the
        # cluster is LAN-only behind an Ingress with TLS.
        - name: dashboard
          image: docker.io/nousresearch/hermes-agent:v2026.4.23
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --port
            - "9119"
            - --insecure
            - --no-open
          env:
            - name: HERMES_HOME
              value: /opt/data
          ports:
            - name: http
              containerPort: 9119
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: data
              mountPath: /opt/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
        - name: vault
          persistentVolumeClaim:
            claimName: hermes-vault
