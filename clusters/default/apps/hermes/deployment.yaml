apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate   # RWO PVC — only one pod can mount at a time
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      # Pin to k3s-control so local-path PVCs (hermes-data, hermes-vault)
      # land on the same node hermes runs on, and so the GPU + storage
      # nodes stay single-purpose.
      #
      # Use nodeSelector, NOT nodeName: setting nodeName directly bypasses
      # the scheduler, and the local-path provisioner depends on the
      # scheduler's volume.kubernetes.io/selected-node annotation to
      # provision PVCs. Skipping the scheduler hangs the PVC in Pending
      # forever.
      nodeSelector:
        kubernetes.io/hostname: k3s-control
      initContainers:
        # Bootstrap /opt/data/config.yaml so the model points at our
        # local llama.cpp endpoint instead of the OpenRouter+Claude
        # default the image's entrypoint would otherwise seed.
        #
        # Runs before the gateway and dashboard containers — they share
        # the same /opt/data PVC. Idempotent: every boot re-applies the
        # overlay, so editing this manifest (or the hermes-model
        # ConfigMap) is enough to redirect Hermes; no manual
        # `hermes config set` ever needed.
        #
        # Falls back to seeding /opt/data/config.yaml from the bundled
        # cli-config.yaml.example on a fresh PVC, then overlays our
        # values on top — preserves all the non-model defaults
        # (compaction, terminal, memory, session reset, etc.).
        - name: bootstrap-config
          image: docker.io/nousresearch/hermes-agent:v2026.4.23
          # Run as the hermes user (UID 10000) — same user the main
          # gateway/dashboard containers run as. This matters because
          # `hermes config set` triggers Hermes's logger, which creates
          # /vault/logs/agent.log + errors.log on first invocation. If
          # this init runs as root, those log files end up root-owned
          # and the main container (UID 10000) crashloops on
          # PermissionError when it tries to append. Running as 10000
          # from the start keeps every file this init creates under the
          # same ownership the runtime expects.
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
          command: ["sh", "-c"]
          args:
            - |
              set -e
              # HERMES_HOME = /vault: Hermes's entire state (config,
              # skills, memories, sessions, persona) lives in the vault
              # PVC, syncing to all the user's devices via Obsidian Sync.
              export HERMES_HOME=/vault
              cfg="$HERMES_HOME/config.yaml"
              H=/opt/hermes/.venv/bin/hermes
              if [ ! -f "$cfg" ]; then
                cp /opt/hermes/cli-config.yaml.example "$cfg"
                echo "[bootstrap] seeded $cfg from cli-config.yaml.example"
              fi
              "$H" config set model.default  "$MODEL_DEFAULT"
              "$H" config set model.provider "$MODEL_PROVIDER"
              "$H" config set model.base_url "$MODEL_BASE_URL"
              # Wire up vault-search MCP. The rag pipeline exposes its
              # MCP server at the URL below; registering it here gives
              # the agent semantic search over vault notes.
              "$H" config set "mcp_servers.vault-search.url"       "$MCP_VAULT_SEARCH_URL"
              "$H" config set "mcp_servers.vault-search.transport" "$MCP_VAULT_SEARCH_TRANSPORT"
              echo "[bootstrap] applied model + MCP overlay"
          env:
            - name: MODEL_DEFAULT
              valueFrom:
                configMapKeyRef:
                  name: hermes-model
                  key: active-model
            - name: MODEL_PROVIDER
              value: custom
            - name: MODEL_BASE_URL
              value: http://llm-proxy.llama-cpp.svc.cluster.local:8080/v1
            - name: MCP_VAULT_SEARCH_URL
              value: http://rag-mcp.rag.svc.cluster.local:8080/mcp/
            # Hermes infers transport from the URL shape (single
            # /mcp/ endpoint = streamable-http). The transport key here
            # is informational only — Hermes doesn't actually have a
            # transport selector in its config schema.
            - name: MCP_VAULT_SEARCH_TRANSPORT
              value: streamable-http
          volumeMounts:
            - name: vault
              mountPath: /vault
      containers:
        - name: hermes
          # Upstream image — pinned to a tagged release rather than :latest
          # so we control when we move forward. Bump deliberately when a
          # new release lands.
          image: docker.io/nousresearch/hermes-agent:v2026.4.23
          # The image's default ENTRYPOINT is `hermes` (the interactive
          # TUI) which exits immediately under k8s. Override args to run
          # the messaging gateway in the foreground — this is the path
          # the upstream docs recommend for Docker / non-systemd hosts.
          args:
            - gateway
            - run
          env:
            # HERMES_HOME points at the vault — all config, skills,
            # memories, sessions, and persona files live in /vault.
            - name: HERMES_HOME
              value: /vault
            # Local llama.cpp via llm-proxy. The proxy logs every request
            # as JSONL and exports per-call latency metrics.
            - name: HERMES_INFERENCE_PROVIDER
              value: custom
            - name: OPENAI_BASE_URL
              value: http://llm-proxy.llama-cpp.svc.cluster.local:8080/v1
            - name: OPENAI_API_KEY
              value: hermes-local   # placeholder; llama.cpp ignores auth
            # NOTE: HERMES_MODEL is intentionally NOT set — per the
            # Hermes docs it only affects the cron scheduler, not chat.
            # The chat path reads model.default from $HERMES_HOME/config.yaml,
            # which the bootstrap-config init container above keeps in
            # sync with the hermes-model ConfigMap.
            # Telegram bot token. Marked optional so the pod boots
            # cleanly before the secret exists; Hermes silently skips
            # Telegram in that case.
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: telegram-bot-token
                  optional: true
            # Telegram allowlist — comma-separated numeric user IDs that
            # are permitted to DM the bot. Hermes denies all messages by
            # default; without this, the bot polls but won't reply.
            # Co-located in hermes-secrets with the bot token (the user
            # IDs aren't actually sensitive, just kept in the same
            # Secret so a single `kubectl get secret hermes-secrets -o
            # yaml` shows the full Telegram-related config).
            # Populated by: cluster_manager.py allow-user --target hermes <ID>
            - name: TELEGRAM_ALLOWED_USERS
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: telegram-allowed-users
                  optional: true
          # Hermes spins up Playwright + Chromium plus a FastAPI backend
          # plus the messaging gateway. 1 GiB baseline is generous; the
          # FTS5 session DB can grow but its working set stays small.
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            # /vault is HERMES_HOME — config, skills, memories, sessions,
            # persona files. Populated by the obsidian-sync sidecar in
            # this namespace.
            - name: vault
              mountPath: /vault
        # Web dashboard sidecar. Hermes splits the gateway (messaging +
        # cron) and the dashboard (FastAPI/React UI for config/sessions)
        # into separate processes; running both as sidecars in one pod
        # lets them share /vault without an extra Deployment.
        # `--insecure` is required to bind off 127.0.0.1 — the dashboard
        # refuses by default because it exposes provider API keys via
        # its config-edit endpoints. We accept that here because the
        # cluster is LAN-only behind an Ingress with TLS.
        - name: dashboard
          image: docker.io/nousresearch/hermes-agent:v2026.4.23
          args:
            - dashboard
            - --host
            - 0.0.0.0
            - --port
            - "9119"
            - --insecure
            - --no-open
          env:
            - name: HERMES_HOME
              value: /vault
          ports:
            - name: http
              containerPort: 9119
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          volumeMounts:
            - name: vault
              mountPath: /vault
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: hermes-vault
