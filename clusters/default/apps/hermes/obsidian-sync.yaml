# Hermes-side Obsidian Sync sidecar.
#
# Pulls the upstream Obsidian Sync vault into hermes-vault PVC.
# Hermes mounts the same PVC at /vault as its workspace.
#
# The rag pipeline runs its own independent obsidian-sync against the
# same upstream vault (see apps/rag-obsidian-sync/) — PVCs are
# namespace-scoped + ReadWriteOnce, so duplicating the sync per
# consumer is how two namespaces share a vault.
#
# The Secret and ConfigMap referenced here are populated by:
#   cluster_manager.py setup-obsidian --target hermes
# Both env refs are optional so the pod boots cleanly before that runs;
# obsidian-sync logs an auth error and idles until the secret arrives.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-vault
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-obsidian-sync-config
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obsidian-sync
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obsidian-sync
  template:
    metadata:
      labels:
        app: obsidian-sync
    spec:
      # Pin to k3s-control so the local-path PVCs land on the same node
      # as the hermes pod (they need to be co-located for hermes to mount
      # hermes-vault at /vault).
      nodeSelector:
        kubernetes.io/hostname: k3s-control
      containers:
        - name: obsidian-sync
          image: ghcr.io/belphemur/obsidian-headless-sync-docker:latest
          env:
            - name: OBSIDIAN_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: obsidian-auth-token
                  optional: true
            - name: VAULT_NAME
              valueFrom:
                configMapKeyRef:
                  name: obsidian-config
                  key: vault-name
                  optional: true
            - name: SYNC_MODE
              value: bidirectional
            # Match the hermes container's UID so files written by sync
            # are owned by 10000:10000 — otherwise hermes (UID 10000)
            # can read but not delete/move the synced notes. The
            # belphemur image's s6-overlay entrypoint chowns the vault
            # dir to PUID:PGID on startup, so changing this value
            # triggers a one-time recursive chown of the existing PVC
            # contents on next pod restart.
            - name: PUID
              value: "10000"
            - name: PGID
              value: "10000"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: vault
              mountPath: /vault
            - name: config
              mountPath: /home/obsidian/.config
      volumes:
        - name: vault
          persistentVolumeClaim:
            claimName: hermes-vault
        - name: config
          persistentVolumeClaim:
            claimName: hermes-obsidian-sync-config
