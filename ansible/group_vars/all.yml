---
# Pinned versions. Bump deliberately.
k3s_version: "v1.35.3+k3s1"
argocd_version: "v3.0.23"
nvidia_device_plugin_chart_version: "0.19.1"
nfd_chart_version: "0.18.3"

# Cluster name used in the clusters/<name>/ directory layout.
cluster_name: "default"

# Default timezone (override via -e timezone=...)
timezone: "UTC"

# LAN domain used for app Ingress hostnames (e.g. argocd.apps.home.arpa).
# Must match your router's wildcard DNS record pointing *.{{ apps_domain }}
# at the control node IP. Keep in sync with the APPS_DOMAIN replacement in
# cluster manifests (rewritten by `cluster_manager.py init-fork`).
#
# Default uses `home.arpa` (RFC 8375 — IETF-reserved TLD for home networks)
# under an `apps.` sub-zone so additional sub-zones (e.g. infra., dev.) can
# coexist. Two-label-after-wildcard shape (*.apps.home.arpa) matters for
# TLS: clients (curl, Node, browsers) reject wildcards on single-label
# parents like *.apps because the wildcard could match too broadly.
apps_domain: "apps.home.arpa"
