---
- name: Check if k3s binary is present
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_binary

# If k3s is already installed, compare the running version against what
# group_vars pins. Previously we only checked for the binary's existence
# and skipped otherwise — which meant version bumps in group_vars silently
# did nothing on nodes that were bootstrapped before the bump. That left
# k3s-gpu + k3s-control on v1.32.3 while group_vars said v1.35.3, and the
# v1.32.3 remotedialer had a bug where agent websocket sessions died
# every ~15 min and didn't reconnect, breaking kubectl logs/exec to the
# GPU node (502 from the apiserver tunnel).
- name: Detect installed k3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_installed_version_raw
  changed_when: false
  # Read-only probe — always safe, including in --check mode. Without
  # check_mode: false the command is skipped under --check and the
  # downstream install-when condition evaluates against an undefined
  # variable, so dry-runs don't show whether an upgrade would fire.
  check_mode: false
  when: k3s_binary.stat.exists

- name: Parse installed k3s version
  ansible.builtin.set_fact:
    # `k3s --version` prints: "k3s version v1.32.3+k3s1 (079ffa8d)\nwithgoversion..."
    # Grab the 3rd whitespace-separated token of the first line.
    k3s_installed_version: "{{ (k3s_installed_version_raw.stdout_lines[0] | default('')).split()[2] | default('') }}"
  when: k3s_binary.stat.exists

- name: Install or upgrade k3s server
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      sh -s - server
  # Runs when k3s is missing OR when the pinned version doesn't match
  # what's actually installed. The installer replaces /usr/local/bin/k3s
  # in-place and restarts the systemd service (≈30s control-plane blip).
  when: (not k3s_binary.stat.exists) or (k3s_installed_version != k3s_version)
  changed_when: true

- name: Ensure k3s is enabled + running
  ansible.builtin.systemd:
    name: k3s
    enabled: true
    state: started

- name: Wait for k3s node-token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60

- name: Read k3s join token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_raw
  no_log: true

- name: Set k3s_token fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"
  no_log: true

- name: Wait for kubeconfig
  ansible.builtin.wait_for:
    path: /etc/rancher/k3s/k3s.yaml
    timeout: 60

- name: Ensure ~/.kube exists for user
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.kube"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'

- name: Copy kubeconfig to user (0600)
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: "/home/{{ ansible_user }}/.kube/config"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'

- name: Wait for control node Ready
  ansible.builtin.command: k3s kubectl wait --for=condition=Ready node/{{ inventory_hostname }} --timeout=120s
  changed_when: false
