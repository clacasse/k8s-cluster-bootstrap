---
- name: Get server address + token from control host facts
  ansible.builtin.set_fact:
    k3s_server_ip: "{{ hostvars[groups['control'][0]]['ansible_host'] | default(hostvars[groups['control'][0]]['ansible_facts']['default_ipv4']['address']) }}"
    k3s_join_token: "{{ hostvars[groups['control'][0]]['k3s_token'] }}"
  no_log: true

- name: Check if k3s binary is present
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_agent_binary

# Version-aware re-install: see comment in k3s-server/tasks/main.yml.
# Skipping on bare binary presence left nodes on stale k3s builds when
# group_vars got bumped.
- name: Detect installed k3s version
  ansible.builtin.command: /usr/local/bin/k3s --version
  register: k3s_installed_version_raw
  changed_when: false
  check_mode: false
  when: k3s_agent_binary.stat.exists

- name: Parse installed k3s version
  ansible.builtin.set_fact:
    k3s_installed_version: "{{ (k3s_installed_version_raw.stdout_lines[0] | default('')).split()[2] | default('') }}"
  when: k3s_agent_binary.stat.exists

# Node-role labels + taints so only workloads that opt in schedule on these nodes:
#   - GPU: AI workloads (llama.cpp) tolerate nvidia.com/gpu=true
#   - storage: stateful workloads (Garage, CNPG) tolerate role=storage
# Keys avoid the kubernetes.io/ namespace: kubelet rejects self-registered labels
# there with the error "unknown 'kubernetes.io' or 'k8s.io' labels specified with
# --node-labels". Use a plain vendor-neutral key instead.
- name: Set k3s agent args
  ansible.builtin.set_fact:
    k3s_agent_exec: >-
      {% if inventory_hostname in groups.get('gpu', []) %}
      agent --node-label nvidia.com/gpu=true --node-taint nvidia.com/gpu=true:NoSchedule
      {% elif inventory_hostname in groups.get('storage', []) %}
      agent --node-label role=storage --node-taint role=storage:NoSchedule
      {% else %}
      agent
      {% endif %}

- name: Ensure containerd config dir exists (GPU node only)
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/agent/etc/containerd
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['gpu']

- name: Set nvidia as default containerd runtime (GPU node only)
  ansible.builtin.copy:
    src: config.toml.tmpl
    dest: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
    mode: '0644'
  when: inventory_hostname in groups['gpu']
  notify: Restart k3s-agent

- name: Install or upgrade k3s agent
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL="https://{{ k3s_server_ip }}:6443" \
      K3S_TOKEN="{{ k3s_join_token }}" \
      INSTALL_K3S_EXEC="{{ k3s_agent_exec | trim }}" \
      sh -
  # Runs when agent is missing OR when the pinned version doesn't match
  # what's actually installed. The installer replaces /usr/local/bin/k3s
  # in-place and restarts k3s-agent.
  when: (not k3s_agent_binary.stat.exists) or (k3s_installed_version != k3s_version)
  changed_when: true
  no_log: true

- name: Update k3s agent server URL
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s-agent.service.env
    mode: '0600'
    content: |
      K3S_TOKEN='{{ k3s_join_token }}'
      K3S_URL='https://{{ k3s_server_ip }}:6443'
  no_log: true
  notify: Restart k3s-agent

- name: Ensure k3s-agent is enabled + running
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
