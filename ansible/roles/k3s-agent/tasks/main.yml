---
- name: Get server address + token from control host facts
  ansible.builtin.set_fact:
    k3s_server_ip: "{{ hostvars[groups['control'][0]]['ansible_host'] | default(hostvars[groups['control'][0]]['ansible_default_ipv4']['address']) }}"
    k3s_join_token: "{{ hostvars[groups['control'][0]]['k3s_token'] }}"
  no_log: true

- name: Check if k3s agent is installed
  ansible.builtin.stat:
    path: /usr/local/bin/k3s
  register: k3s_agent_binary

# GPU node gets a label + taint so only AI workloads schedule there.
- name: Set k3s agent args
  ansible.builtin.set_fact:
    k3s_agent_exec: >-
      {% if inventory_hostname in groups['gpu'] %}
      agent --node-label nvidia.com/gpu=true --node-taint nvidia.com/gpu=true:NoSchedule
      {% else %}
      agent
      {% endif %}

- name: Ensure containerd config dir exists (GPU node only)
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/agent/etc/containerd
    state: directory
    mode: '0755'
  when: inventory_hostname in groups['gpu']

- name: Set nvidia as default containerd runtime (GPU node only)
  ansible.builtin.copy:
    src: config.toml.tmpl
    dest: /var/lib/rancher/k3s/agent/etc/containerd/config.toml.tmpl
    mode: '0644'
  when: inventory_hostname in groups['gpu']
  notify: Restart k3s-agent

- name: Install k3s agent (pinned version)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION="{{ k3s_version }}" \
      K3S_URL="https://{{ k3s_server_ip }}:6443" \
      K3S_TOKEN="{{ k3s_join_token }}" \
      INSTALL_K3S_EXEC="{{ k3s_agent_exec | trim }}" \
      sh -
  when: not k3s_agent_binary.stat.exists
  changed_when: true
  no_log: true

- name: Update k3s agent server URL
  ansible.builtin.copy:
    dest: /etc/systemd/system/k3s-agent.service.env
    mode: '0600'
    content: |
      K3S_TOKEN='{{ k3s_join_token }}'
      K3S_URL='https://{{ k3s_server_ip }}:6443'
  no_log: true
  notify: Restart k3s-agent

- name: Ensure k3s-agent is enabled + running
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
