---
# Storage node prep. A storage node is a cluster node with fast local storage
# (NVMe) dedicated to persistent stateful workloads — Garage, CloudNativePG,
# etc. Workloads are pinned to it via nodeAffinity + tolerations that reference
# the node label and taint applied by the k3s-agent role at join time.
#
# This role assumes the NVMe is the boot disk. k3s's local-path provisioner
# writes to /var/lib/rancher/k3s/storage/ on the root filesystem, which IS the
# NVMe when there's no separate data disk.

- name: Ensure k3s local-path storage directory exists
  ansible.builtin.file:
    path: /var/lib/rancher/k3s/storage
    state: directory
    mode: '0755'

- name: Enable weekly fstrim on SSD/NVMe
  ansible.builtin.systemd:
    name: fstrim.timer
    enabled: true
    state: started
