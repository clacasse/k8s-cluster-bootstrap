---
- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
    cache_valid_time: 3600

- name: Install base utilities
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - jq
      - ca-certificates
      - gnupg
      - unattended-upgrades
    state: present

- name: Enable unattended security upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";

- name: Set timezone
  community.general.timezone:
    name: "{{ timezone | default('UTC') }}"

- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ node_hostname | default(inventory_hostname_short) }}"
  register: hostname_set

- name: Ensure 127.0.1.1 maps to hostname
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1\s'
    line: "127.0.1.1 {{ node_hostname | default(inventory_hostname_short) }}"
    state: present

- name: Renew DHCP lease so router DNS picks up new hostname
  ansible.builtin.shell: |
    for iface in $(ls /sys/class/net | grep -v '^lo$'); do
      if [ -d "/sys/class/net/$iface" ] && [ "$(cat /sys/class/net/$iface/operstate 2>/dev/null)" = "up" ]; then
        networkctl renew "$iface" 2>/dev/null || dhclient -r "$iface" 2>/dev/null && dhclient "$iface" 2>/dev/null || true
      fi
    done
  when: hostname_set.changed
  changed_when: false
  failed_when: false

# Raspberry Pi: Ubuntu's default ARM kernel ships without the memory cgroup enabled.
# k3s refuses to start ("failed to find memory cgroup (v2)") unless we append these
# flags to the bootloader cmdline. Idempotent via negative lookahead.
- name: Check for Pi-style bootloader cmdline
  ansible.builtin.stat:
    path: /boot/firmware/cmdline.txt
  register: pi_cmdline
  when: ansible_facts['architecture'] in ["aarch64", "arm64"]

- name: Enable memory cgroup on aarch64 (required by k3s on Pi)
  ansible.builtin.replace:
    path: /boot/firmware/cmdline.txt
    regexp: '^(?!.*cgroup_memory=1)(.*)$'
    replace: '\1 cgroup_memory=1 cgroup_enable=memory'
  when:
    - ansible_facts['architecture'] in ["aarch64", "arm64"]
    - pi_cmdline.stat.exists | default(false)
  notify: Reboot for cgroup change
