---
# Cluster bootstrap: install k3s across all nodes and Argo CD on control.
# Assumes every host has already been prepared via prep.yml.
- name: k3s server (control plane)
  hosts: control
  become: true
  roles:
    - k3s-server

- name: k3s agents (workers + GPU node)
  hosts: agents
  become: true
  roles:
    - k3s-agent

- name: Argo CD + root Application
  hosts: control
  become: true
  roles:
    - argocd
